<!DOCTYPE html>
<html>
<head>
  <title>OAuth Callback</title>
</head>
<body>

<h2>OAuth Callback</h2>

<div id="status">Processing...</div>

<div id="form" style="display:none;">
  <p>Enter your credentials:</p>

  <label>Client ID:</label><br>
  <input id="client_id" style="width:400px"><br><br>

  <label>Client Secret:</label><br>
  <input id="client_secret" style="width:400px"><br><br>

  <button onclick="exchange()">Get Tokens</button>
</div>

<pre id="output"></pre>

<script>
const REDIRECT_URI = window.location.origin + window.location.pathname;

function getCode() {
  const params = new URLSearchParams(window.location.search);
  return params.get("code");
}

const code = getCode();

if (!code) {
  document.getElementById("status").textContent = "❌ No code in URL";
} else {
  document.getElementById("status").textContent =
    "✅ Code received. Enter credentials to continue.";
  document.getElementById("form").style.display = "block";
}

async function exchange() {
  const client_id = document.getElementById("client_id").value;
  const client_secret = document.getElementById("client_secret").value;

  const body = new URLSearchParams({
    client_id,
    client_secret,
    code,
    grant_type: "authorization_code",
    redirect_uri: REDIRECT_URI
  });

  const res = await fetch("https://oauth2.googleapis.com/token", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: body
  });

  const data = await res.json();

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);

  console.log("REFRESH TOKEN:", data.refresh_token);
}
</script>

</body>
</html>
