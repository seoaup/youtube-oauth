<!DOCTYPE html>
<html>
<head>
  <title>YouTube OAuth Tool</title>
</head>
<body>

<h2>YouTube OAuth Tool</h2>

<div id="setup">
  <label>Client ID:</label><br>
  <input id="client_id" style="width:400px"><br><br>

  <label>Client Secret:</label><br>
  <input id="client_secret" style="width:400px"><br><br>

  <button onclick="startOAuth()">Authorize with Google</button>
</div>

<hr>

<div id="result" style="display:none;">
  <h3>Result</h3>
  <pre id="output"></pre>

  <button onclick="downloadJson()">Download JSON</button>
</div>

<script>
const REDIRECT_URI = window.location.origin + window.location.pathname;

let tokenData = null;
let userEmail = null;

// Step 1 → Redirect to Google
function startOAuth() {
  const client_id = document.getElementById("client_id").value;

  if (!client_id) {
    alert("Enter Client ID");
    return;
  }

  // Store values temporarily
  localStorage.setItem("client_id", client_id);
  localStorage.setItem("client_secret", document.getElementById("client_secret").value);

  const scope = encodeURIComponent(
    "https://www.googleapis.com/auth/youtube.force-ssl https://www.googleapis.com/auth/userinfo.email"
  );

  const url =
    "https://accounts.google.com/o/oauth2/v2/auth?" +
    "client_id=" + encodeURIComponent(client_id) +
    "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
    "&response_type=code" +
    "&scope=" + scope +
    "&access_type=offline" +
    "&prompt=consent";

  window.location.href = url;
}

// Step 2 → Handle redirect
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  if (!code) return;

  document.getElementById("setup").style.display = "none";
  document.getElementById("result").style.display = "block";

  const client_id = localStorage.getItem("client_id");
  const client_secret = localStorage.getItem("client_secret");

  // Exchange code → token
  const body = new URLSearchParams({
    client_id,
    client_secret,
    code,
    grant_type: "authorization_code",
    redirect_uri: REDIRECT_URI
  });

  const res = await fetch("https://oauth2.googleapis.com/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body
  });

  tokenData = await res.json();

  if (!tokenData.access_token) {
    document.getElementById("output").textContent =
      "❌ Token error:\n" + JSON.stringify(tokenData, null, 2);
    return;
  }

  // Get user email
  const userRes = await fetch("https://www.googleapis.com/oauth2/v2/userinfo", {
    headers: {
      Authorization: "Bearer " + tokenData.access_token
    }
  });

  const userInfo = await userRes.json();
  userEmail = userInfo.email;

  document.getElementById("output").textContent =
    JSON.stringify({
      email: userEmail,
      refresh_token: tokenData.refresh_token
    }, null, 2);
}

// Step 3 → Download JSON
function downloadJson() {
  if (!tokenData || !userEmail) {
    alert("No data yet");
    return;
  }

  const client_id = localStorage.getItem("client_id");
  const client_secret = localStorage.getItem("client_secret");

  const data = {
    [userEmail]: {
      client_id,
      client_secret,
      refresh_token: tokenData.refresh_token
    }
  };

  const blob = new Blob(
    [JSON.stringify(data, null, 4)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = userEmail + ".json";
  a.click();
}

// Run on load
handleCallback();
</script>

</body>
</html>
